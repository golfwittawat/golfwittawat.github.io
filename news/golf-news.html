<!DOCTYPE html>
<html lang="th" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="n8n News" />
    <meta name="theme-color" content="#07090e" id="themeColor" />
    <title>n8n News</title>
    <link rel="manifest" id="manifestLink" />
    <link rel="apple-touch-icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e8392a'/%3E%3Ctext y='.9em' font-size='80' x='10'%3EN%3C/text%3E%3C/svg%3E" />
    <link
        href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        /* ── THEME VARS ── */
        [data-theme="dark"] {
            --bg: #07090e;
            --s1: #0b0e15;
            --s2: #0f1420;
            --s3: #141924;
            --bdr: #1a2232;
            --bdr2: #233050;
            --acc: #e8392a;
            --acc2: #ff6354;
            --acc3: rgba(232, 57, 42, .1);
            --text: #dde4f2;
            --text2: #aab4cc;
            --muted: #4e5e7a;
            --muted2: #7888a5;
            --card: #0b0e15;
            --nav: rgba(7, 9, 14, .93);
            --shadow: rgba(0, 0, 0, .5);
            --sidebar-w: 260px;
        }

        [data-theme="light"] {
            --bg: #f2f4f8;
            --s1: #ffffff;
            --s2: #f7f8fc;
            --s3: #eef0f6;
            --bdr: #dde2ee;
            --bdr2: #c8cfdf;
            --acc: #e8392a;
            --acc2: #c82a1c;
            --acc3: rgba(232, 57, 42, .08);
            --text: #1a2035;
            --text2: #3a4a65;
            --muted: #8898b5;
            --muted2: #5a6a85;
            --card: #ffffff;
            --nav: rgba(242, 244, 248, .95);
            --shadow: rgba(0, 0, 0, .1);
            --sidebar-w: 260px;
        }

        html,
        body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background .3s, color .3s;
        }

        /* ── APP SHELL LAYOUT ── */
        .layout {
            display: flex;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            position: relative;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--s1);
            border-right: 1px solid var(--bdr);
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            z-index: 200;
            transition: transform .3s, background .3s, border-color .3s;
            overflow: hidden;
        }

        .sidebar-logo {
            padding: 1.25rem 1.25rem 1rem;
            border-bottom: 1px solid var(--bdr);
            flex-shrink: 0;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: .65rem
        }

        .logo-mark {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            background: var(--acc);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .75rem;
            font-weight: 900;
            color: #fff;
            font-family: 'Playfair Display', serif;
            box-shadow: 0 0 16px rgba(232, 57, 42, .35);
            flex-shrink: 0;
        }

        .logo-text {
            font-family: 'Playfair Display', serif;
            font-size: .95rem;
            font-weight: 700;
            color: var(--text)
        }

        .logo-text em {
            font-style: normal;
            color: var(--acc)
        }

        .logo-sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            color: var(--muted);
            margin-top: .2rem;
            letter-spacing: .06em
        }

        .sidebar-search {
            padding: .75rem 1rem;
            border-bottom: 1px solid var(--bdr);
            flex-shrink: 0;
        }

        .sidebar-search input {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            padding: .45rem .75rem;
            font-family: 'Sarabun', sans-serif;
            font-size: .8rem;
            color: var(--text);
            outline: none;
            transition: border-color .2s, background .3s;
        }

        .sidebar-search input::placeholder {
            color: var(--muted)
        }

        .sidebar-search input:focus {
            border-color: var(--acc)
        }

        .sidebar-nav {
            flex: 1;
            overflow-y: auto;
            padding: .5rem 0
        }

        .sidebar-nav::-webkit-scrollbar {
            width: 3px
        }

        .sidebar-nav::-webkit-scrollbar-thumb {
            background: var(--bdr2);
            border-radius: 99px
        }

        .nav-section {
            margin-bottom: .25rem
        }

        .nav-section-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            color: var(--muted);
            letter-spacing: .1em;
            text-transform: uppercase;
            padding: .5rem 1.25rem .3rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .5rem 1.25rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: background .15s, border-color .15s, color .15s;
            font-size: .83rem;
            color: var(--text2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .nav-item:hover {
            background: var(--s2);
            color: var(--text)
        }

        .nav-item.active {
            background: var(--acc3);
            border-left-color: var(--acc);
            color: var(--acc2);
            font-weight: 600;
        }

        .nav-item .ni-emoji {
            font-size: .9rem;
            flex-shrink: 0
        }

        .nav-item .ni-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .nav-item .ni-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            background: var(--s3);
            border: 1px solid var(--bdr);
            border-radius: 99px;
            padding: .1rem .45rem;
            color: var(--muted2);
            flex-shrink: 0;
        }

        .nav-item.active .ni-count {
            background: var(--acc3);
            border-color: rgba(232, 57, 42, .25);
            color: var(--acc2)
        }

        .sidebar-footer {
            padding: .75rem 1rem;
            border-top: 1px solid var(--bdr);
            flex-shrink: 0;
        }

        /* ── MAIN CONTENT ── */
        .main {
            margin-left: var(--sidebar-w);
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── TOPBAR ── */
        .topbar {
            flex-shrink: 0;
            background: var(--nav);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--bdr);
            padding: 0 1.75rem;
            padding-top: env(safe-area-inset-top);
            height: calc(56px + env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: background .3s, border-color .3s;
            z-index: 100;
        }

        .topbar-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .topbar-title em {
            font-style: normal;
            color: var(--acc)
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: .6rem;
            flex-shrink: 0
        }

        .live-badge {
            display: flex;
            align-items: center;
            gap: .35rem;
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: #00d87a;
            letter-spacing: .07em;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00d87a;
            animation: pulse 2s ease infinite
        }

        @keyframes pulse {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(0, 216, 122, .5)
            }

            50% {
                box-shadow: 0 0 0 5px rgba(0, 216, 122, 0)
            }
        }

        .count-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem;
            background: var(--s2);
            border: 1px solid var(--bdr);
            border-radius: 5px;
            padding: .2rem .55rem;
            color: var(--muted2);
        }

        /* ── THEME TOGGLE ── */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--s2);
            border: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .95rem;
            transition: all .2s;
            color: var(--text2);
        }

        .theme-toggle:hover {
            background: var(--s3);
            border-color: var(--bdr2)
        }

        /* ── MOBILE TOGGLE ── */
        .sidebar-toggle {
            display: none;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: var(--s2);
            border: 1px solid var(--bdr);
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text2);
        }

        /* ── CONTENT AREA — scrollable zone ── */
        .content-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
            scroll-behavior: smooth;
        }

        .content {
            padding: 1.5rem 1.75rem 2rem;
            max-width: 1300px;
        }

        /* ── PAGE HEADER ── */
        .page-header {
            margin-bottom: 1.5rem
        }

        .page-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.4rem, 2.5vw, 2rem);
            font-weight: 900;
            line-height: 1.1;
            color: var(--text);
            letter-spacing: -.02em;
        }

        .page-header h1 em {
            font-style: normal;
            color: var(--acc)
        }

        .page-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: .5rem;
            flex-wrap: wrap;
        }

        .page-date {
            font-family: 'JetBrains Mono', monospace;
            font-size: .65rem;
            color: var(--muted);
            letter-spacing: .06em
        }

        /* ── STATS ROW ── */
        .stats {
            display: flex;
            gap: .6rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem
        }

        .stat {
            padding: .4rem .9rem;
            background: var(--s1);
            border: 1px solid var(--bdr);
            border-radius: 7px;
            display: flex;
            align-items: center;
            gap: .5rem;
            transition: background .3s, border-color .3s;
        }

        .stat-n {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text)
        }

        .stat-l {
            font-size: .7rem;
            color: var(--muted2)
        }

        /* ── FILTER BAR ── */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: .5rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem
        }

        .search-wrap {
            display: flex;
            align-items: center;
            gap: .5rem;
            background: var(--s1);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: .4rem .85rem;
            flex: 1;
            max-width: 300px;
            min-width: 180px;
            transition: border-color .2s, background .3s;
        }

        .search-wrap:focus-within {
            border-color: var(--acc)
        }

        .search-wrap input {
            background: none;
            border: none;
            outline: none;
            font-family: 'Sarabun', sans-serif;
            font-size: .82rem;
            color: var(--text);
            width: 100%;
        }

        .search-wrap input::placeholder {
            color: var(--muted)
        }

        .search-icon {
            color: var(--muted);
            font-size: .8rem
        }

        .sort-select {
            background: var(--s1);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: .4rem .75rem;
            font-family: 'Sarabun', sans-serif;
            font-size: .78rem;
            color: var(--text2);
            outline: none;
            cursor: pointer;
            transition: background .3s, border-color .3s;
        }

        .sort-select:focus {
            border-color: var(--acc)
        }

        /* ── CATEGORY PILLS ── */
        .cat-pills {
            display: flex;
            gap: .35rem;
            flex-wrap: wrap;
            margin-bottom: 1.25rem
        }

        .cat-pill {
            padding: .28rem .75rem;
            border-radius: 20px;
            border: 1px solid var(--bdr);
            background: none;
            color: var(--muted2);
            font-family: 'Sarabun', sans-serif;
            font-size: .73rem;
            cursor: pointer;
            transition: all .2s;
            white-space: nowrap;
        }

        .cat-pill:hover {
            border-color: var(--bdr2);
            color: var(--text)
        }

        .cat-pill.on {
            background: var(--acc3);
            border-color: rgba(232, 57, 42, .35);
            color: var(--acc2);
            font-weight: 600
        }

        /* ── NEWS GRID ── */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.1rem;
        }

        /* ── SOURCE PAGE — featured layout ── */
        .source-featured {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.1rem;
            margin-bottom: 1.1rem;
        }

        .source-featured .card:first-child {
            grid-column: 1/-1
        }

        /* ── CARD ── */
        .card {
            background: var(--card);
            border: 1px solid var(--bdr);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform .22s, border-color .22s, box-shadow .22s, background .3s;
            animation: cardIn .35s ease both;
        }

        .card:hover {
            transform: translateY(-3px);
            border-color: var(--bdr2);
            box-shadow: 0 12px 36px var(--shadow);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(14px)
            }

            to {
                opacity: 1;
                transform: none
            }
        }

        .card-img {
            width: 100%;
            height: 170px;
            background: var(--s2);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            transition: background .3s;
        }

        .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform .4s
        }

        .card:hover .card-img img {
            transform: scale(1.04)
        }

        .card-img-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: .4rem;
        }

        .card-img-placeholder span {
            font-size: 2rem;
            opacity: .25
        }

        .card-img-placeholder small {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            color: var(--muted);
            opacity: .5
        }

        /* featured card bigger image */
        .source-featured .card:first-child .card-img {
            height: 260px
        }

        .cat-badge {
            position: absolute;
            top: .6rem;
            left: .6rem;
            padding: .18rem .55rem;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            font-weight: 700;
            letter-spacing: .06em;
            backdrop-filter: blur(10px);
        }

        .cat-ข่าวทั่วไป {
            background: rgba(232, 57, 42, .18);
            color: #ff8070
        }

        .cat-การเมือง {
            background: rgba(251, 191, 36, .12);
            color: #fbbf24
        }

        .cat-เศรษฐกิจ {
            background: rgba(0, 216, 122, .1);
            color: #00d87a
        }

        .cat-สตาร์ทอัพ {
            background: rgba(0, 212, 255, .1);
            color: #00d4ff
        }

        .cat-วาไรตี้ {
            background: rgba(255, 122, 53, .1);
            color: #ff7a35
        }

        .cat-English {
            background: rgba(130, 100, 255, .12);
            color: #a78bff
        }

        .cat-IT-Dev {
            background: rgba(0, 212, 255, .12);
            color: #00d4ff
        }

        .cat-Enterprise-IT {
            background: rgba(0, 200, 150, .1);
            color: #00c896
        }

        .cat-AI {
            background: rgba(200, 100, 255, .12);
            color: #d080ff
        }

        .cat-Gadget {
            background: rgba(255, 200, 50, .1);
            color: #fbbf24
        }

        .card-body {
            padding: .9rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: .4rem
        }

        .card-source-row {
            display: flex;
            align-items: center;
            gap: .4rem
        }

        .src-dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--acc);
            flex-shrink: 0
        }

        .src-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: .6rem;
            color: var(--muted);
            letter-spacing: .04em
        }

        .src-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: .58rem;
            color: var(--muted);
            margin-left: auto
        }

        .card-title {
            font-size: .9rem;
            font-weight: 700;
            line-height: 1.5;
            color: var(--text);
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-title a {
            color: inherit;
            text-decoration: none;
            transition: color .2s
        }

        .card-title a:hover {
            color: var(--acc2)
        }

        .source-featured .card:first-child .card-title {
            font-size: 1.05rem;
            -webkit-line-clamp: 4
        }

        .card-excerpt {
            font-size: .76rem;
            color: var(--text2);
            line-height: 1.65;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex: 1;
            transition: color .3s;
        }

        .card-footer {
            padding: .65rem 1rem;
            border-top: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: flex-end;
            transition: border-color .3s;
        }

        .read-link {
            display: flex;
            align-items: center;
            gap: .3rem;
            padding: .25rem .65rem;
            border-radius: 6px;
            background: var(--acc3);
            border: 1px solid rgba(232, 57, 42, .22);
            color: var(--acc2);
            font-size: .67rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            text-decoration: none;
            transition: all .2s;
            white-space: nowrap;
        }

        .read-link:hover {
            background: rgba(232, 57, 42, .18);
            border-color: rgba(232, 57, 42, .45)
        }

        /* ── SOURCE HEADER (on source page) ── */
        .source-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem 1.25rem;
            background: var(--s1);
            border: 1px solid var(--bdr);
            border-radius: 10px;
            margin-bottom: 1.25rem;
            transition: background .3s, border-color .3s;
        }

        .source-icon {
            font-size: 2rem
        }

        .source-info h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text)
        }

        .source-info p {
            font-size: .75rem;
            color: var(--muted2);
            margin-top: .2rem
        }

        .source-stats {
            margin-left: auto;
            text-align: right
        }

        .source-stats .big {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text)
        }

        .source-stats .lbl {
            font-size: .65rem;
            color: var(--muted)
        }

        /* ── EMPTY/LOADING ── */
        .empty {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem 1rem;
            color: var(--muted)
        }

        .empty span {
            font-size: 3rem;
            display: block;
            margin-bottom: .75rem;
            opacity: .3
        }

        .loading {
            display: flex;
            justify-content: center;
            padding: 4rem;
            grid-column: 1/-1
        }

        .spinner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--bdr2);
            border-top-color: var(--acc);
            animation: spin 1s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        /* ── MOBILE OVERLAY ── */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .55);
            z-index: 150;
            backdrop-filter: blur(3px);
        }

        /* ── BOTTOM NAV (mobile only) ── */
        .bottom-nav {
            display: none;
            /* shown via media query on mobile */
            flex-shrink: 0;
            background: var(--s1);
            border-top: 1px solid var(--bdr);
            padding: .45rem 0;
            padding-bottom: calc(.45rem + env(safe-area-inset-bottom));
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            transition: background .3s, border-color .3s;
            z-index: 300;
        }

        .bottom-nav-inner {
            display: flex;
            justify-content: space-around;
            align-items: center
        }

        .bnav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: .2rem;
            padding: .4rem .6rem;
            border-radius: 8px;
            border: none;
            background: none;
            color: var(--muted2);
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: .62rem;
            min-width: 56px;
            transition: color .15s;
        }

        .bnav-btn .bnav-icon {
            font-size: 1.2rem;
            line-height: 1
        }

        .bnav-btn.active {
            color: var(--acc)
        }

        .bnav-btn:active {
            transform: scale(.92)
        }

        /* ─────────────────────────────────────
   BREAKPOINT: MOBILE  ≤ 640px
───────────────────────────────────── */
        @media(max-width:640px) {

            /* sidebar as drawer */
            .sidebar {
                transform: translateX(-100%);
                width: min(85vw, 300px);
                box-shadow: 8px 0 32px rgba(0, 0, 0, .4);
            }

            .sidebar.open {
                transform: none
            }

            .sidebar-overlay.open {
                display: block
            }

            /* main takes full width */
            .main {
                margin-left: 0
            }

            /* topbar adjustments */
            .topbar {
                padding: 0 .9rem;
                height: 52px;
                gap: .5rem
            }

            .topbar-title {
                font-size: .85rem
            }

            .sidebar-toggle {
                display: flex
            }

            .live-badge {
                display: none
            }

            /* content padding */
            .content {
                padding: .85rem .85rem 1.5rem
            }

            /* single column cards */
            .grid {
                grid-template-columns: 1fr;
                gap: .75rem
            }

            .source-featured {
                grid-template-columns: 1fr;
                gap: .75rem
            }

            .source-featured .card:first-child {
                grid-column: 1
            }

            .source-featured .card:first-child .card-img {
                height: 200px
            }

            /* compact cards */
            .card-img {
                height: 150px
            }

            .card-body {
                padding: .75rem .85rem;
                gap: .3rem
            }

            .card-footer {
                padding: .55rem .85rem
            }

            .card-title {
                font-size: .88rem
            }

            .card-excerpt {
                -webkit-line-clamp: 2;
                font-size: .74rem
            }

            /* page header */
            .page-header h1 {
                font-size: 1.3rem
            }

            .stats {
                gap: .4rem
            }

            .stat {
                padding: .35rem .7rem
            }

            .stat-n {
                font-size: .9rem
            }

            /* search full width */
            .search-wrap {
                max-width: 100%;
                flex: 1
            }

            .filter-bar {
                flex-wrap: wrap;
                gap: .4rem
            }

            /* source header compact */
            .source-header {
                flex-wrap: wrap;
                gap: .6rem;
                padding: .85rem 1rem
            }

            .source-icon {
                font-size: 1.6rem
            }

            .source-info h2 {
                font-size: 1rem
            }

            .source-stats .big {
                font-size: 1.1rem
            }

            /* bottom nav visible */
            .bottom-nav {
                display: flex;
                flex-direction: column
            }
        }

        /* ─────────────────────────────────────
   BREAKPOINT: TABLET  641px – 1024px
───────────────────────────────────── */
        @media(min-width:641px) and (max-width:1024px) {

            /* narrow sidebar */
            [data-theme="dark"],
            [data-theme="light"] {
                --sidebar-w: 64px
            }

            /* icon-only sidebar */
            .sidebar {
                overflow: visible;
                z-index: 200
            }

            .sidebar-logo {
                padding: .85rem .75rem
            }

            .logo-text,
            .logo-sub {
                display: none
            }

            .sidebar-search {
                display: none
            }

            .nav-section-label {
                display: none
            }

            .nav-item {
                padding: .6rem 0;
                justify-content: center;
                border-left: none;
                border-radius: 0;
            }

            .nav-item .ni-label,
            .nav-item .ni-count {
                display: none
            }

            .nav-item .ni-emoji {
                font-size: 1.2rem
            }

            .nav-item.active {
                background: var(--acc3)
            }

            /* tooltip on hover */
            .nav-item {
                position: relative
            }

            .nav-item::after {
                content: attr(data-tooltip);
                position: absolute;
                left: calc(100% + 10px);
                top: 50%;
                transform: translateY(-50%);
                background: var(--s3);
                border: 1px solid var(--bdr2);
                color: var(--text);
                font-family: 'Sarabun', sans-serif;
                font-size: .75rem;
                padding: .3rem .7rem;
                border-radius: 6px;
                white-space: nowrap;
                opacity: 0;
                pointer-events: none;
                transition: opacity .15s;
                z-index: 999;
            }

            .nav-item:hover::after {
                opacity: 1
            }

            .sidebar-footer {
                padding: .5rem;
                text-align: center;
                font-size: .5rem
            }

            .sidebar-footer>div {
                display: none
            }

            /* toggle button hidden, sidebar always visible */
            .sidebar-toggle {
                display: none
            }

            /* content area */
            .content {
                padding: 1.25rem 1.25rem 3rem
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
                gap: .9rem
            }

            .source-featured {
                grid-template-columns: 1fr 1fr;
                gap: .9rem
            }

            /* topbar */
            .topbar {
                padding: 0 1.25rem
            }
        }

        /* ─────────────────────────────────────
   BREAKPOINT: DESKTOP  1025px – 1280px
───────────────────────────────────── */
        @media(min-width:1025px) and (max-width:1280px) {

            [data-theme="dark"],
            [data-theme="light"] {
                --sidebar-w: 220px
            }

            .grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr))
            }
        }

        /* ─────────────────────────────────────
   BREAKPOINT: WIDE  > 1280px
───────────────────────────────────── */
        @media(min-width:1281px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr))
            }

            .content {
                padding: 1.75rem 2rem 3rem
            }
        }

        /* ── MOBILE SHEET ── */
        .mobile-sheet {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 400;
            background: rgba(0, 0, 0, .5);
            backdrop-filter: blur(4px);
            align-items: flex-end;
        }

        .mobile-sheet.open {
            display: flex
        }

        .sheet-inner {
            width: 100%;
            background: var(--s1);
            border-radius: 18px 18px 0 0;
            border-top: 1px solid var(--bdr);
            max-height: 75vh;
            display: flex;
            flex-direction: column;
            animation: sheetUp .25s ease;
        }

        @keyframes sheetUp {
            from {
                transform: translateY(100%)
            }

            to {
                transform: none
            }
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            border-radius: 99px;
            background: var(--bdr2);
            margin: .7rem auto .25rem;
            flex-shrink: 0;
        }

        .sheet-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text);
            padding: .5rem 1.25rem .75rem;
            flex-shrink: 0;
        }

        .sheet-search {
            padding: 0 1rem .75rem;
            flex-shrink: 0
        }

        .sheet-search input {
            width: 100%;
            background: var(--s2);
            border: 1px solid var(--bdr);
            border-radius: 8px;
            padding: .5rem .85rem;
            font-family: 'Sarabun', sans-serif;
            font-size: .85rem;
            color: var(--text);
            outline: none;
        }

        .sheet-search input:focus {
            border-color: var(--acc)
        }

        .sheet-list {
            overflow-y: auto;
            padding: .25rem 0 1rem;
            -webkit-overflow-scrolling: touch
        }

        .sheet-item {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .75rem 1.25rem;
            cursor: pointer;
            transition: background .15s;
            font-size: .9rem;
            color: var(--text2);
        }

        .sheet-item:hover,
        .sheet-item:active {
            background: var(--s2)
        }

        .sheet-item.active {
            color: var(--acc);
            font-weight: 700
        }

        .sheet-item-emoji {
            font-size: 1.1rem;
            width: 24px;
            text-align: center
        }

        .sheet-item-label {
            flex: 1
        }

        .sheet-item-count {
            font-family: 'JetBrains Mono', monospace;
            font-size: .62rem;
            color: var(--muted);
            background: var(--s3);
            border: 1px solid var(--bdr);
            border-radius: 99px;
            padding: .1rem .5rem;
        }
    </style>
</head>

<body>
    <div class="sidebar-overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="mobile-sheet" id="srcSheet" onclick="closeSheets()">
        <div class="sheet-inner" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title">📡 เลือกสำนักข่าว</div>
            <div class="sheet-search">
                <input type="text" id="sheetSearch" placeholder="🔍 ค้นหา..." oninput="filterSheet()" />
            </div>
            <div class="sheet-list" id="sheetList"></div>
        </div>
    </div>

    <div class="mobile-sheet" id="catSheet" onclick="closeSheets()">
        <div class="sheet-inner" onclick="event.stopPropagation()">
            <div class="sheet-handle"></div>
            <div class="sheet-title">🏷️ เลือกหมวดหมู่</div>
            <div class="sheet-list" id="catSheetList"></div>
        </div>
    </div>

    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div class="logo-row">
                    <div class="logo-mark">N</div>
                    <div>
                        <div class="logo-text">n8n <em>News</em></div>
                        <div class="logo-sub">RSS AGGREGATOR</div>
                    </div>
                </div>
            </div>

            <div class="sidebar-search">
                <input type="text" id="sideSearch" placeholder="🔍 ค้นหาสำนักข่าว..." />
            </div>

            <nav class="sidebar-nav" id="sidebarNav">
                <div class="nav-section">
                    <div class="nav-section-label">ภาพรวม</div>
                    <div class="nav-item active" data-page="all" onclick="setPage('all')">
                        <span class="ni-emoji">🗞️</span>
                        <span class="ni-label">ข่าวทั้งหมด</span>
                        <span class="ni-count" id="cnt-all">—</span>
                    </div>
                </div>
                <div class="nav-section" id="catSection">
                    <div class="nav-section-label">หมวดหมู่</div>
                </div>
                <div class="nav-section" id="srcSection">
                    <div class="nav-section-label">สำนักข่าว</div>
                </div>
            </nav>

            <div class="sidebar-footer">
                <div
                    style="font-family:'JetBrains Mono',monospace;font-size:.58rem;color:var(--muted);text-align:center">
                    อัปเดต: <span id="updateTime">—</span>
                </div>
            </div>
        </aside>

        <div class="main">
            <header class="topbar">
                <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                <div class="topbar-title" id="topbarTitle">ข่าว<em>วันนี้</em></div>
                <div class="topbar-right">
                    <div class="live-badge">
                        <div class="live-dot"></div>LIVE
                    </div>
                    <div class="count-badge" id="countBadge">— items</div>
                    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()" title="เปลี่ยนธีม">🌙</button>
                </div>
            </header>

            <div class="content-scroll" id="contentScroll">
                <div class="content" id="mainContent">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-nav" id="bottomNav">
                <div class="bottom-nav-inner">
                    <button class="bnav-btn active" id="bnav-all" onclick="setPage('all');setBnavActive('all')">
                        <span class="bnav-icon">🗞️</span>ทั้งหมด
                    </button>
                    <button class="bnav-btn" id="bnav-src" onclick="toggleMobileSrcSheet()">
                        <span class="bnav-icon">📡</span>สำนัก
                    </button>
                    <button class="bnav-btn" id="bnav-cat" onclick="toggleMobileCatSheet()">
                        <span class="bnav-icon">🏷️</span>หมวด
                    </button>
                    <button class="bnav-btn" id="bnav-search" onclick="focusMobileSearch()">
                        <span class="bnav-icon">🔍</span>ค้นหา
                    </button>
                    <button class="bnav-btn" onclick="toggleTheme()">
                        <span class="bnav-icon" id="bnavThemeIcon">🌙</span>ธีม
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════
        //  CONFIG
        // ═══════════════════════════════════════════════
        const N8N_WEBHOOK_URL = 'https://mako-quiet-legally.ngrok-free.app/webhook/news-viewer';
        const USE_MOCK = false;

        // ═══════════════════════════════════════════════
        const catEmoji = {
            'ข่าวทั่วไป': '📰', 'การเมือง': '🏛️', 'เศรษฐกิจ': '💹', 'สตาร์ทอัพ': '🚀',
            'วาไรตี้': '🎭', 'English': '🌐', 'IT/Dev': '💻', 'Enterprise IT': '🏢',
            'AI': '🤖', 'Gadget': '📱'
        };

        const MOCK_DATA = [
            { title: 'ไทยรัฐ — ข่าวตัวอย่างหัวข้อแรก ซึ่งอาจยาวหน่อย', source: 'ไทยรัฐ', category: 'ข่าวทั่วไป', pubDate: 'Sun, 08 Mar 2026 06:00:00 +0700', link: 'https://www.thairath.co.th', enclosure: '', content: 'เนื้อหาตัวอย่างสำหรับทดสอบ' },
            { title: 'Blognone — ข่าวไอทีล่าสุด', source: 'Blognone', category: 'IT/Dev', pubDate: 'Sun, 08 Mar 2026 07:00:00 +0700', link: 'https://www.blognone.com', enclosure: '', content: 'ข่าวไอทีตัวอย่าง' },
            { title: 'Bangkok Post — Today Headlines', source: 'Bangkok Post', category: 'English', pubDate: 'Sun, 08 Mar 2026 06:30:00 +0700', link: 'https://www.bangkokpost.com', enclosure: '', content: 'English news sample' },
            { title: 'TechCrunch — AI Developments', source: 'TechCrunch AI', category: 'AI', pubDate: 'Sun, 08 Mar 2026 08:00:00 +0700', link: 'https://techcrunch.com', enclosure: '', content: 'AI news sample' },
            { title: 'ประชาชาติธุรกิจ — ข่าวเศรษฐกิจ', source: 'ประชาชาติธุรกิจ', category: 'เศรษฐกิจ', pubDate: 'Sun, 08 Mar 2026 06:45:00 +0700', link: 'https://www.prachachat.net', enclosure: '', content: 'ข่าวเศรษฐกิจตัวอย่าง' },
        ];

        let allNews = [];
        let currentPage = 'all';      // 'all' | 'cat:xxx' | 'src:xxx'
        let activeCat = 'all';
        let searchQuery = '';
        let sortMode = 'newest';

        // ─── THEME ───
        const savedTheme = localStorage.getItem('newsTheme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        const _themeIcon = savedTheme === 'dark' ? '🌙' : '☀️';
        document.getElementById('themeBtn').textContent = _themeIcon;
        // sync bottom nav icon when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            const bi = document.getElementById('bnavThemeIcon');
            if (bi) bi.textContent = _themeIcon;
        });

        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('newsTheme', next);
            const ico = next === 'dark' ? '🌙' : '☀️';
            document.getElementById('themeBtn').textContent = ico;
            const bico = document.getElementById('bnavThemeIcon');
            if (bico) bico.textContent = ico;
            // update PWA theme color
            if (typeof updateThemeColorMeta === 'function') updateThemeColorMeta();
        }

        // ─── SIDEBAR MOBILE ───
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('open');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('open');
        }

        // ─── LOAD NEWS ───
        async function loadNews() {
            try {
                if (USE_MOCK) {
                    allNews = MOCK_DATA;
                } else {
                    const res = await fetch(N8N_WEBHOOK_URL, {
                        headers: { 'ngrok-skip-browser-warning': 'true', 'Accept': 'application/json' }
                    });
                    const text = await res.text();
                    try {
                        const json = JSON.parse(text);
                        allNews = Array.isArray(json) ? json : (json.data || []);
                    } catch (e) {
                        document.getElementById('mainContent').innerHTML =
                            '<div style="padding:3rem;text-align:center;color:var(--muted)">⚠️ Response ไม่ใช่ JSON — ตรวจสอบ Webhook URL</div>';
                        return;
                    }
                }
                const now = new Date();
                document.getElementById('updateTime').textContent =
                    now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
                buildSidebar();
                renderPage();
            } catch (e) {
                document.getElementById('mainContent').innerHTML =
                    '<div style="padding:3rem;text-align:center;color:var(--muted)">❌ เชื่อมต่อ Webhook ไม่ได้</div>';
            }
        }

        // ─── BUILD SIDEBAR ───
        function buildSidebar() {
            // total
            document.getElementById('cnt-all').textContent = allNews.length;

            // categories
            const catMap = {};
            allNews.forEach(n => { catMap[n.category || ''] = (catMap[n.category || ''] || 0) + 1 });
            const catSection = document.getElementById('catSection');
            catSection.innerHTML = '<div class="nav-section-label">หมวดหมู่</div>' +
                Object.entries(catMap).sort((a, b) => b[1] - a[1]).map(([c, n]) => `
      <div class="nav-item" data-page="cat:${c}" data-tooltip="${c || 'ไม่มีหมวด'}" onclick="setPage('cat:${esc(c)}')">
        <span class="ni-emoji">${catEmoji[c] || '📌'}</span>
        <span class="ni-label">${c || 'ไม่มีหมวด'}</span>
        <span class="ni-count">${n}</span>
      </div>`).join('');

            // sources
            const srcMap = {};
            allNews.forEach(n => { srcMap[n.source || ''] = (srcMap[n.source || ''] || 0) + 1 });
            const srcSection = document.getElementById('srcSection');
            srcSection.innerHTML = '<div class="nav-section-label">สำนักข่าว</div>' +
                Object.entries(srcMap).sort((a, b) => b[1] - a[1]).map(([s, n]) => `
      <div class="nav-item" data-page="src:${esc(s)}" data-tooltip="${s || 'ไม่ระบุ'}" onclick="setPage('src:${esc(s)}')">
        <span class="ni-emoji">📡</span>
        <span class="ni-label">${s || 'ไม่ระบุ'}</span>
        <span class="ni-count">${n}</span>
      </div>`).join('');

            // sidebar search filter
            document.getElementById('sideSearch').addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                document.querySelectorAll('#srcSection .nav-item').forEach(el => {
                    const txt = el.querySelector('.ni-label').textContent.toLowerCase();
                    el.style.display = txt.includes(q) ? '' : 'none';
                });
            });
        }

        function esc(s) { return (s || '').replace(/'/g, "\\'") }

        function setPage(page) {
            currentPage = page;
            activeCat = 'all';
            searchQuery = '';
            // sync sidebar active
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.toggle('active', el.dataset.page === page);
            });
            closeSidebar();
            renderPage();
        }

        // ─── RENDER PAGE ───
        function renderPage() {
            const mc = document.getElementById('mainContent');
            const tb = document.getElementById('topbarTitle');

            if (currentPage === 'all') {
                tb.innerHTML = 'ข่าว<em>วันนี้</em>';
                renderAllPage(mc);
            } else if (currentPage.startsWith('cat:')) {
                const cat = currentPage.slice(4);
                tb.innerHTML = `${catEmoji[cat] || '📌'} <em>${cat}</em>`;
                renderCatPage(mc, cat);
            } else if (currentPage.startsWith('src:')) {
                const src = currentPage.slice(4);
                tb.innerHTML = `📡 <em>${src}</em>`;
                renderSourcePage(mc, src);
            }
        }

        function getFiltered(news) {
            let filtered = [...news];
            if (activeCat !== 'all') filtered = filtered.filter(n => n.category === activeCat);
            if (searchQuery) filtered = filtered.filter(n =>
                (n.title || '').toLowerCase().includes(searchQuery) ||
                (n.source || '').toLowerCase().includes(searchQuery) ||
                (n.content || '').toLowerCase().includes(searchQuery)
            );
            if (sortMode === 'newest') filtered.sort((a, b) => new Date(b.pubDate || 0) - new Date(a.pubDate || 0));
            else if (sortMode === 'oldest') filtered.sort((a, b) => new Date(a.pubDate || 0) - new Date(b.pubDate || 0));
            else if (sortMode === 'source') filtered.sort((a, b) => (a.source || '').localeCompare(b.source || ''));
            return filtered;
        }

        // ─── ALL PAGE ───
        function renderAllPage(mc) {
            const now = new Date();
            const cats = [...new Set(allNews.map(n => n.category).filter(Boolean))];

            mc.innerHTML = `
    <div class="page-header">
      <h1>ข่าว<em>วันนี้</em> จากทุกสำนัก</h1>
      <div class="page-meta">
        <div class="page-date">📅 ${now.toLocaleDateString('th-TH', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}</div>
      </div>
    </div>
    <div class="stats" id="statsRow"></div>
    <div class="filter-bar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="ค้นหาข่าว..."/></div>
      <select class="sort-select" id="sortSel" onchange="sortMode=this.value;renderPage()">
        <option value="newest">ล่าสุดก่อน</option>
        <option value="oldest">เก่าสุดก่อน</option>
        <option value="source">เรียงตามสำนัก</option>
      </select>
    </div>
    <div class="cat-pills" id="catPills"></div>
    <div class="grid" id="newsGrid"></div>`;

            buildStats(allNews, 'statsRow');
            buildCatPills(cats, 'catPills');
            document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); renderCards('newsGrid', allNews) });
            document.getElementById('sortSel').value = sortMode;
            renderCards('newsGrid', allNews);
            document.getElementById('countBadge').textContent = allNews.length + ' items';
        }

        // ─── CATEGORY PAGE ───
        function renderCatPage(mc, cat) {
            const news = allNews.filter(n => n.category === cat);
            const sources = [...new Set(news.map(n => n.source).filter(Boolean))];

            mc.innerHTML = `
    <div class="page-header">
      <h1>${catEmoji[cat] || '📌'} <em>${cat}</em></h1>
      <div class="page-meta">
        <div class="page-date">${news.length} ข่าว · ${sources.length} สำนัก</div>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="ค้นหาใน ${cat}..."/></div>
      <select class="sort-select" id="sortSel" onchange="sortMode=this.value;renderPage()">
        <option value="newest">ล่าสุดก่อน</option>
        <option value="oldest">เก่าสุดก่อน</option>
        <option value="source">เรียงตามสำนัก</option>
      </select>
    </div>
    <div class="grid" id="newsGrid"></div>`;

            document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); renderCards('newsGrid', news) });
            document.getElementById('sortSel').value = sortMode;
            renderCards('newsGrid', news);
            document.getElementById('countBadge').textContent = news.length + ' items';
        }

        // ─── SOURCE PAGE ───
        function renderSourcePage(mc, src) {
            const news = allNews.filter(n => n.source === src);
            const cat = news[0]?.category || '';

            mc.innerHTML = `
    <div class="source-header">
      <div class="source-icon">${catEmoji[cat] || '📡'}</div>
      <div class="source-info">
        <h2>${src}</h2>
        <p>${cat} · วันนี้</p>
      </div>
      <div class="source-stats">
        <div class="big">${news.length}</div>
        <div class="lbl">ข่าววันนี้</div>
      </div>
    </div>
    <div class="filter-bar">
      <div class="search-wrap"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="ค้นหาใน ${src}..."/></div>
      <select class="sort-select" id="sortSel" onchange="sortMode=this.value;renderPage()">
        <option value="newest">ล่าสุดก่อน</option>
        <option value="oldest">เก่าสุดก่อน</option>
      </select>
    </div>
    <div id="newsGrid"></div>`;

            document.getElementById('searchInput').addEventListener('input', e => { searchQuery = e.target.value.toLowerCase(); renderSourceCards('newsGrid', news) });
            document.getElementById('sortSel').value = sortMode;
            renderSourceCards('newsGrid', news);
            document.getElementById('countBadge').textContent = news.length + ' items';
        }

        function renderSourceCards(gridId, news) {
            const filtered = getFiltered(news);
            const grid = document.getElementById(gridId);
            if (!filtered.length) {
                grid.innerHTML = '<div class="empty"><span>📭</span><p>ไม่พบข่าว</p></div>';
                return;
            }
            // Featured layout: first card full-width
            if (filtered.length >= 3) {
                grid.innerHTML =
                    `<div class="source-featured">${filtered.slice(0, 3).map((n, i) => buildCard(n, i)).join('')}</div>` +
                    `<div class="grid">${filtered.slice(3).map((n, i) => buildCard(n, i)).join('')}</div>`;
            } else {
                grid.innerHTML = `<div class="grid">${filtered.map((n, i) => buildCard(n, i)).join('')}</div>`;
            }
        }

        // ─── HELPERS ───
        function buildStats(news, id) {
            const catMap = {};
            news.forEach(n => { catMap[n.category || '?'] = (catMap[n.category || '?'] || 0) + 1 });
            const top = Object.entries(catMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
            document.getElementById(id).innerHTML =
                `<div class="stat"><span class="stat-n">${news.length}</span><span class="stat-l">ทั้งหมด</span></div>` +
                top.map(([c, n]) => `<div class="stat"><span class="stat-n">${n}</span><span class="stat-l">${catEmoji[c] || ''}${c}</span></div>`).join('');
        }

        function buildCatPills(cats, id) {
            const allCats = ['all', ...cats];
            document.getElementById(id).innerHTML = allCats.map(c => `
    <button class="cat-pill ${c === activeCat ? 'on' : ''}" onclick="setCat('${esc(c)}')">
      ${c === 'all' ? 'ทั้งหมด' : (catEmoji[c] || '') + ' ' + c}
    </button>`).join('');
        }

        function setCat(cat) {
            activeCat = cat;
            document.querySelectorAll('.cat-pill').forEach(el => {
                el.classList.toggle('on', el.textContent.trim().includes(cat === 'all' ? 'ทั้งหมด' : cat));
            });
            renderCards('newsGrid', allNews);
        }

        function renderCards(gridId, news) {
            const filtered = getFiltered(news);
            const grid = document.getElementById(gridId);
            if (!grid) return;
            if (!filtered.length) {
                grid.innerHTML = '<div class="empty"><span>📭</span><p>ไม่พบข่าวที่ตรงกัน</p></div>';
                return;
            }
            grid.innerHTML = filtered.map((n, i) => buildCard(n, i)).join('');
        }

        function buildCard(n, i) {
            const catKey = (n.category || '').replace(/[\/\s]/g, '-');
            const clean = (s => '') + (n.content || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
            const date = n.pubDate ? new Date(n.pubDate).toLocaleString('th-TH', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' }) : '';
            const img = n.enclosure
                ? `<img src="${n.enclosure}" alt="" loading="lazy" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder><span>${catEmoji[n.category] || '📰'}</span></div>'">`
                : `<div class="card-img-placeholder"><span>${catEmoji[n.category] || '📰'}</span><small>${n.source || ''}</small></div>`;

            return `
  <div class="card" style="animation-delay:${i * 0.03}s">
    <div class="card-img">
      ${img}
      ${n.category ? `<span class="cat-badge cat-${catKey}">${catEmoji[n.category] || ''} ${n.category}</span>` : ''}
    </div>
    <div class="card-body">
      <div class="card-source-row">
        <div class="src-dot"></div>
        <span class="src-label">${n.source || 'RSS'}</span>
        <span class="src-time">${date}</span>
      </div>
      <div class="card-title"><a href="${n.link || '#'}" target="_blank" rel="noopener">${n.title || 'ไม่มีหัวข้อ'}</a></div>
      <div class="card-excerpt">${clean.substring(0, 180)}...</div>
    </div>
    <div class="card-footer">
      <a class="read-link" href="${n.link || '#'}" target="_blank" rel="noopener">อ่านต่อ →</a>
    </div>
  </div>`;
        }

        // ─── MOBILE BOTTOM NAV ───
        function setBnavActive(id) {
            document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
            const el = document.getElementById('bnav-' + id);
            if (el) el.classList.add('active');
        }

        function toggleMobileSrcSheet() {
            closeSheets();
            buildSrcSheet();
            document.getElementById('srcSheet').classList.add('open');
            setTimeout(() => document.getElementById('sheetSearch')?.focus(), 100);
        }

        function toggleMobileCatSheet() {
            closeSheets();
            buildCatSheet();
            document.getElementById('catSheet').classList.add('open');
        }

        function closeSheets() {
            document.querySelectorAll('.mobile-sheet').forEach(s => s.classList.remove('open'));
        }

        function focusMobileSearch() {
            const inp = document.getElementById('searchInput');
            if (inp) { inp.focus(); inp.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        }

        function buildSrcSheet() {
            const srcMap = {};
            allNews.forEach(n => { srcMap[n.source || ''] = (srcMap[n.source || ''] || 0) + 1 });
            const list = document.getElementById('sheetList');
            list.innerHTML = Object.entries(srcMap).sort((a, b) => b[1] - a[1]).map(([s, n]) => `
    <div class="sheet-item ${currentPage === 'src:' + s ? 'active' : ''}" onclick="setPage('src:${esc(s)}');closeSheets();setBnavActive('src')">
      <span class="sheet-item-emoji">📡</span>
      <span class="sheet-item-label">${s || 'ไม่ระบุ'}</span>
      <span class="sheet-item-count">${n}</span>
    </div>`).join('');
        }

        function buildCatSheet() {
            const catMap = {};
            allNews.forEach(n => { catMap[n.category || ''] = (catMap[n.category || ''] || 0) + 1 });
            const list = document.getElementById('catSheetList');
            list.innerHTML = `
    <div class="sheet-item ${currentPage === 'all' ? 'active' : ''}" onclick="setPage('all');closeSheets();setBnavActive('all')">
      <span class="sheet-item-emoji">🗞️</span>
      <span class="sheet-item-label">ทั้งหมด</span>
      <span class="sheet-item-count">${allNews.length}</span>
    </div>` +
                Object.entries(catMap).sort((a, b) => b[1] - a[1]).map(([c, n]) => `
    <div class="sheet-item ${currentPage === 'cat:' + c ? 'active' : ''}" onclick="setPage('cat:${esc(c)}');closeSheets();setBnavActive('cat')">
      <span class="sheet-item-emoji">${catEmoji[c] || '📌'}</span>
      <span class="sheet-item-label">${c || 'ไม่มีหมวด'}</span>
      <span class="sheet-item-count">${n}</span>
    </div>`).join('');
        }

        function filterSheet() {
            const q = document.getElementById('sheetSearch').value.toLowerCase();
            document.querySelectorAll('#sheetList .sheet-item').forEach(el => {
                el.style.display = el.querySelector('.sheet-item-label').textContent.toLowerCase().includes(q) ? '' : 'none';
            });
        }

        // close sheet on back gesture
        window.addEventListener('keydown', e => { if (e.key === 'Escape') closeSheets() });

        // sync theme icon in bottom nav
        const _origToggleTheme = toggleTheme;
        // patch toggleTheme to also update bottom nav icon
        function toggleTheme() {
            const cur = document.documentElement.getAttribute('data-theme');
            const next = cur === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('newsTheme', next);
            const ico = next === 'dark' ? '🌙' : '☀️';
            document.getElementById('themeBtn').textContent = ico;
            const bico = document.getElementById('bnavThemeIcon');
            if (bico) bico.textContent = ico;
        }

        // ─── INIT ───
        loadNews();

        // ─── PWA: MANIFEST ───
        (function () {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const bg = isDark ? '#07090e' : '#f2f4f8';
            const manifest = {
                name: 'n8n News Viewer',
                short_name: 'n8n News',
                description: 'RSS News aggregator powered by n8n',
                start_url: './',
                display: 'standalone',
                orientation: 'portrait-primary',
                background_color: bg,
                theme_color: '#e8392a',
                icons: [
                    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e8392a'/%3E%3Ctext y='.85em' font-size='72' font-family='serif' font-weight='bold' fill='white' x='12'%3EN%3C/text%3E%3C/svg%3E", sizes: '192x192', type: 'image/svg+xml' },
                    { src: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23e8392a'/%3E%3Ctext y='.85em' font-size='72' font-family='serif' font-weight='bold' fill='white' x='12'%3EN%3C/text%3E%3C/svg%3E", sizes: '512x512', type: 'image/svg+xml', purpose: 'any maskable' }
                ]
            };
            const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            document.getElementById('manifestLink').href = url;
        })();

        // ─── PWA: SERVICE WORKER ───
        if ('serviceWorker' in navigator) {
            const SW = `
const CACHE = 'n8n-news-v1';
const STATIC = ['./', './index.html'];
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys =>
    Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))
  ));
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  if(e.request.method !== 'GET') return;
  // network-first for API, cache-first for assets
  const url = new URL(e.request.url);
  if(url.pathname.includes('webhook')){
    e.respondWith(fetch(e.request).catch(()=>new Response('[]',{headers:{'Content-Type':'application/json'}})));
  }
});
`;
            const swBlob = new Blob([SW], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(swBlob);
            navigator.serviceWorker.register(swUrl, { scope: './' }).catch(() => { });
        }

        // ─── PWA: INSTALL PROMPT ───
        let deferredPrompt = null;
        window.addEventListener('beforeinstallprompt', e => {
            e.preventDefault();
            deferredPrompt = e;
            showInstallBanner();
        });

        function showInstallBanner() {
            if (document.getElementById('installBanner')) return;
            const banner = document.createElement('div');
            banner.id = 'installBanner';
            banner.style.cssText = `
    position:fixed;bottom:calc(64px + env(safe-area-inset-bottom) + 8px);left:50%;
    transform:translateX(-50%);z-index:500;
    background:var(--acc);color:#fff;
    padding:.6rem 1.2rem;border-radius:99px;
    font-family:'Sarabun',sans-serif;font-size:.82rem;font-weight:700;
    display:flex;align-items:center;gap:.6rem;
    box-shadow:0 4px 20px rgba(232,57,42,.45);
    cursor:pointer;white-space:nowrap;
    animation:slideUp .3s ease;
  `;
            banner.innerHTML = '📲 ติดตั้งแอปนี้ <span style="opacity:.7;font-size:.72rem">✕</span>';
            banner.querySelector('span').onclick = (e) => { e.stopPropagation(); banner.remove(); };
            banner.onclick = async () => {
                if (!deferredPrompt) return;
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                deferredPrompt = null;
                banner.remove();
            };
            document.body.appendChild(banner);
            setTimeout(() => { if (banner.parentNode) banner.style.opacity = '0'; setTimeout(() => banner.remove(), 400); }, 8000);
        }

        // ─── FIX: sync theme color meta ───
        function updateThemeColorMeta() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.getElementById('themeColor').content = isDark ? '#07090e' : '#f2f4f8';
        }
        updateThemeColorMeta();

        // ─── FIX: scroll to top on page change ───
        const _origRenderPage = renderPage;
        renderPage = function () {
            _origRenderPage();
            const cs = document.getElementById('contentScroll');
            if (cs) cs.scrollTop = 0;
        };

        // add slide-up keyframe
        const styleEl = document.createElement('style');
        styleEl.textContent = '@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
        document.head.appendChild(styleEl);
    </script>
</body>

</html>
